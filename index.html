<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Game Navigator</title>

<style>
/* ——————————————————————————————
   GLOBAL
—————————————————————————————— */
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
}

/* ——————————————————————————————
   BUTTON STYLING
—————————————————————————————— */
button {
    background: #000;
    color: #fff;
    border: 1px solid #fff;
    padding: 6px 10px;
    margin-right: 6px;
    cursor: pointer;
}

button.active {
    background: #fff;
    color: #000;
    border: 1px solid #000;
}

/* ——————————————————————————————
   TOP BAR
—————————————————————————————— */
#topBar {
    width: 100%;
    height: 60px;
    background: #111;
    display: flex;
    align-items: center;
    padding: 0 10px;
    box-sizing: border-box;
    gap: 6px;
    transition: 0.25s ease;
    overflow: visible;
}

/* Search bar (leftmost) */
#urlInput {
    flex: 1;
    padding: 6px;
    background: #000;
    border: 1px solid #fff;
    color: #fff;
}

/* Tiny spacing between middle group and embed group */
.group-gap {
    width: 4px;
}

/* ——————————————————————————————
   AUTOCOMPLETE (under top bar)
—————————————————————————————— */
#autocomplete {
    position: absolute;
    top: 60px;
    left: 10px;
    width: calc(100% - 20px);
    max-height: 250px;
    overflow-y: auto;
    background: #111;
    border: 1px solid #333;
    z-index: 99999;
}

.autoItem {
    padding: 6px;
    border-bottom: 1px solid #333;
    cursor: pointer;
}
.autoItem:hover {
    background: #333;
}

/* ——————————————————————————————
   SIDEBAR
—————————————————————————————— */
#searchContainer {
    width: 300px;
    background: #111;
    height: 100vh;
    position: fixed;
    left: -300px;
    top: 0;
    padding: 10px;
    box-sizing: border-box;
    transition: 0.25s ease;
    z-index: 9998;
}
#searchContainer.active {
    left: 0;
}

#savedSites, #workingSites {
    max-height: 200px;
    overflow-y: auto;
    background: #181818;
    border: 1px solid #333;
    margin-top: 6px;
}

.savedItem {
    padding: 6px;
    border-bottom: 1px solid #333;
    cursor: pointer;
}
.savedItem:hover {
    background: #333;
}

.deleteBtn {
    float: right;
    color: #f44;
    cursor: pointer;
}

/* ——————————————————————————————
   VIEWER
—————————————————————————————— */
#viewer {
    width: 100%;
    height: calc(100vh - 60px);
    background: #000;
    position: relative;
    z-index: 1;
}

/* ——————————————————————————————
   UI-HIDE SYSTEM
—————————————————————————————— */
body.uiHidden #topBar {
    transform: translateY(-60px);
}

#mnuReveal {
    position: fixed;
    bottom: 10px;
    right: 10px;
    padding: 4px 8px;
    font-size: 12px;
    opacity: 0;
    pointer-events: none;
    background: #000;
    border: 1px solid #fff;
    color: #fff;
    border-radius: 4px;
    transition: opacity 0.15s;
    z-index: 9999;
}

body.uiHidden #mnuReveal {
    pointer-events: auto;
}
body.uiHidden #mnuReveal:hover {
    opacity: 1;
}
</style>
</head>

<body>

<!-- ——————————————————————————————
     TOP BAR
—————————————————————————————— -->
<div id="topBar">

    <!-- LEFT GROUP -->
    <input id="urlInput" placeholder="Enter URL...">
    <button id="goBtn">Go</button>
    <button id="saveBtn">Save</button>
    <button id="openBtn">Menu</button>

    <!-- MIDDLE GROUP -->
    <button id="clckBtn">popt</button>
    <button id="vtprBtn">vew</button>

    <!-- POPUP MODE TOGGLES -->
    <button id="abtBtn" class="active">abt:blnk</button>
    <button id="blbBtn">blb</button>

    <div class="group-gap"></div>

    <!-- EMBED MODE BUTTONS -->
    <button class="modeBtn active" data-mode="iframe">iframe</button>
    <button class="modeBtn" data-mode="object">js</button>
    <button class="modeBtn" data-mode="embed">embed</button>

</div>

<!-- AUTOCOMPLETE DROPDOWN -->
<div id="autocomplete"></div>

<!-- ——————————————————————————————
     SIDEBAR
—————————————————————————————— -->
<div id="searchContainer">
    <button id="closeBtn">Close</button>
    <button id="hdeBtn">hde</button>

    <h3>Saved Sites</h3>
    <div id="savedSites"></div>

    <h3>Working Sites</h3>
    <div id="workingSites"></div>
</div>

<!-- ——————————————————————————————
     VIEWER
—————————————————————————————— -->
<div id="viewer"></div>

<!-- ——————————————————————————————
     INVISIBLE MNU BUTTON
—————————————————————————————— -->
<button id="mnuReveal">mnu</button>

<script src="script.js"></script>
</body>
</html>
