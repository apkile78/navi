<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Game Navigator</title>

<style>
/* ————— EXISTING STYLES ————— */

body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
}

#topBar {
    width: 100%;
    height: 60px;
    background: #111;
    display: flex;
    align-items: center;
    padding: 0 10px;
    box-sizing: border-box;
    transition: 0.25s ease;
}

#sidebar {
    width: 260px;
    background: #111;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    padding: 10px;
    box-sizing: border-box;
    z-index: 9998;
}

#closeBtn, #hdeBtn {
    margin-right: 6px;
}

/* ————— NEW UI-HIDE SYSTEM ————— */

/* Slide top bar up when hidden */
body.uiHidden #topBar {
    transform: translateY(-60px);
}

/* mnu button (bottom-right, invisible unless hovered) */
#mnuReveal {
    position: fixed;
    bottom: 10px;
    right: 10px;
    padding: 4px 8px;
    font-size: 12px;
    opacity: 0;               /* fully invisible */
    pointer-events: none;     /* inactive unless UI hidden */
    background: #111;
    border: 1px solid #444;
    color: #fff;
    border-radius: 4px;
    transition: opacity 0.15s;
    z-index: 9999;
}

/* When UI is hidden, the button becomes hover-active */
body.uiHidden #mnuReveal {
    pointer-events: auto;
}

/* Only visible when hovered */
body.uiHidden #mnuReveal:hover {
    opacity: 1;
}

</style>
</head>

<body>

<!-- ————— TOP BAR ————— -->
<div id="topBar">
    <button id="menuBtn">Menu</button>
    <button id="randomBtn">Random</button>
    <button id="searchBtn">Search</button>
</div>

<!-- ————— SIDEBAR ————— -->
<div id="sidebar" style="display:none;">
    <button id="closeBtn">Close</button>
    <button id="hdeBtn">hde</button>
    <input id="searchInput" placeholder="Search...">
    <div id="results"></div>
</div>

<!-- ————— GAME FRAME ————— -->
<iframe id="gameFrame" src="" style="width:100%;height:calc(100vh - 60px);border:none;"></iframe>

<!-- ————— INVISIBLE MNU BUTTON ————— -->
<button id="mnuReveal">mnu</button>

<script src="script.js"></script>
</body>
</html>
